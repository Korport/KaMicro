services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: "3001"
      DOMAIN: "https://${DOMAIN}"
      GIPHY_API_KEY: "${GIPHY_API_KEY}"
    # No exposed ports — Caddy is the only public-facing service

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      DOMAIN: "${DOMAIN}"
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
